<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eminem Meme Generator</title>
    <style>
        :root {
            --watch-top: 35%;
            --watch-left: 53%;
            --watch-rotate: -5deg;
            --watch-size: 12%;
            
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00ff00;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #000; 
            color: white; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .meme-container {
            position: relative;
            display: inline-block;
            max-width: 600px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .meme-img { display: block; width: 100%; height: auto; transition: transform 0.3s; }

        .meme-text-overlay {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            text-align: center;
            font-size: clamp(1.2rem, 5vw, 2.8rem);
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000;
            pointer-events: none;
        }

        .watch-dial {
            position: absolute;
            top: var(--watch-top); 
            left: var(--watch-left);
            width: var(--watch-size); 
            aspect-ratio: 1 / 1;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(var(--watch-rotate));
        }

        .meme-timer-overlay {
            font-family: monospace;
            font-size: clamp(0.4rem, 2vw, 0.9rem);
            color: var(--accent);
            font-weight: bold;
        }

        .controls { 
            margin-top: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%; 
            max-width: 400px; 
        }

        input { 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: var(--glass);
            backdrop-filter: blur(10px);
            color: white;
            outline: none;
        }

        button {
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: scale(1.02); }

        .explode {
            animation: explosion 0.5s forwards;
        }

        @keyframes explosion {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(5) sepia(1) hue-rotate(-50deg); opacity: 1; }
            100% { transform: scale(5); filter: brightness(10); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="memeArea" class="meme-container">
        <img id="eminemPic" src="https://github.com/perlch/emiclock/blob/main/eminem.jpg?raw=true" class="meme-img">
        <div id="displayTitle" class="meme-text-overlay">TOP TEXT HERE</div>
        <div class="watch-dial">
            <div id="displayTime" class="meme-timer-overlay">00:00</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="inputTitle" placeholder="Topic...">
        <input type="text" id="inputTime" placeholder="Time (e.g. 1:30 or 05:00)">
        <button id="startBtn">START COUNTDOWN</button>
    </div>

    <script>
        const inputTitle = document.getElementById('inputTitle');
        const inputTime = document.getElementById('inputTime');
        const displayTitle = document.getElementById('displayTitle');
        const displayTime = document.getElementById('displayTime');
        const startBtn = document.getElementById('startBtn');
        const memeArea = document.getElementById('memeArea');

        let countdown;

        const urlParams = new URLSearchParams(window.location.search);
        const themeParam = urlParams.get('theme');
        const timeParam = urlParams.get('time');

        if (themeParam) {
            inputTitle.value = themeParam;
            displayTitle.innerText = themeParam.toUpperCase();
        }
        if (timeParam) {
            inputTime.value = timeParam.replace('-', ':');
            displayTime.innerText = timeParam.replace('-', ':');
        }

        inputTitle.addEventListener('input', (e) => {
            displayTitle.innerText = e.target.value.toUpperCase() || "TOP TEXT HERE";
        });

        inputTime.addEventListener('input', (e) => {
            displayTime.innerText = e.target.value || "00:00";
        });

        startBtn.addEventListener('click', () => {
            clearInterval(countdown);
            const parts = inputTime.value.trim().split(/[:.-]/); 
            let totalSeconds = 0;
            if (parts.length === 2) {
                totalSeconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
            } else if (parts.length === 1) {
                totalSeconds = parseInt(parts[0]);
            }

            if (isNaN(totalSeconds) || totalSeconds <= 0) return;

            countdown = setInterval(() => {
                totalSeconds--;
                const mins = Math.floor(totalSeconds / 60);
                const secs = totalSeconds % 60;
                displayTime.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    triggerExplosion();
                }
            }, 1000);
        });

        function triggerExplosion() {
            memeArea.classList.add('explode');
            setTimeout(() => { location.reload(); }, 600);
        }
    </script>
</body>
</html>
